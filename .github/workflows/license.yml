name: License

on:
  push:
    branches:
      - main
      - release-*.*
  pull_request:
    branches:
      - main
      - release-*.*
jobs:
  license-header-check:
    runs-on: ubuntu-latest
    name: license-header-check
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: hawkeye
      - run: hawkeye check
